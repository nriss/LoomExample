name: dpi-sejour-to-fhir-encounter
version: 2.0.0
author: nriss
tags: [encounter, sejour, dpi]

description:
  fr: "Export des séjours DPI vers Encounter FHIR R4"
  en: "Export DPI hospital stays to FHIR R4 Encounter"

source:
  datasource: dpi_test
  query: |
    SELECT
      s.numero_sejour,
      s.date_entree,
      s.date_sortie,
      s.statut,
      s.type_sejour,
      s.mode_entree,
      s.libelle_mode_entree,
      s.mode_sortie,
      s.libelle_mode_sortie,
      s.uf_code,
      s.uf_libelle,
      s.dp_cim,
      s.dp_libelle,
      p.ipp
    FROM sejour s
    JOIN patient p ON p.id_patient = s.id_patient
    WHERE s.statut != 'ANNULE'
    ORDER BY s.date_entree DESC

target:
  resource: Encounter

lifecycle:
  strategy: upsert
  match_by:
    - column: numero_sejour
      fhir_path: Encounter.identifier[type.coding.code='NDA'].value

mappings:

  # identifier — cardinalité 0..*, as est correct ici
  - column: numero_sejour
    target: Encounter.identifier
    as:
      identifier.use: "official"
      identifier.type.coding[0].system: "https://hl7.fr/ig/fhir/core/CodeSystem/fr-core-cs-v2-0203"
      identifier.type.coding[0].code: "NDA"
      identifier.value: "$.numero_sejour"

  - column: statut
    target: Encounter.status
    transform:
      type: map
      values:
        EN_COURS: in-progress
        TERMINE: finished
        ANNULE: cancelled
      default: unknown

  # class — Coding unique (1..1), NE PAS utiliser `as` (créerait un tableau)
  - target: Encounter.class.system
    transform:
      type: literal
      value: "http://terminology.hl7.org/CodeSystem/v3-ActCode"

  - column: type_sejour
    target: Encounter.class.code

  - column: uf_libelle
    target: Encounter.class.display

  - column: date_entree
    target: Encounter.period.start
    transform:
      type: date
      from: YYYY-MM-DD

  - column: date_sortie
    target: Encounter.period.end
    transform:
      type: date
      from: YYYY-MM-DD

  # serviceType — CodeableConcept unique (0..1), NE PAS utiliser `as`
  - column: uf_code
    target: Encounter.serviceType.coding[0].code

  - column: uf_libelle
    target: Encounter.serviceType.text

  # reasonCode — CodeableConcept 0..*, as est correct ici
  - column: dp_cim
    target: Encounter.reasonCode
    as:
      reasonCode.coding[0].system: "http://hl7.org/fhir/sid/icd-10"
      reasonCode.coding[0].code: "$.dp_cim"
      reasonCode.text: "$.dp_libelle"

  # hospitalization — objet unique (0..1), NE PAS utiliser `as`
  - target: Encounter.hospitalization.admitSource.coding[0].system
    transform:
      type: literal
      value: "https://mos.esante.gouv.fr/NOS/TRE_R213-ModePriseEnCharge/FHIR/TRE-R213-ModePriseEnCharge"

  - column: mode_entree
    target: Encounter.hospitalization.admitSource.coding[0].code

  - column: libelle_mode_entree
    target: Encounter.hospitalization.admitSource.text

  - target: Encounter.hospitalization.dischargeDisposition.coding[0].system
    transform:
      type: literal
      value: "https://mos.esante.gouv.fr/NOS/TRE_R213-ModePriseEnCharge/FHIR/TRE-R213-ModePriseEnCharge"

  - column: mode_sortie
    target: Encounter.hospitalization.dischargeDisposition.coding[0].code

  - column: libelle_mode_sortie
    target: Encounter.hospitalization.dischargeDisposition.text

  - column: ipp
    target: Encounter.subject.reference
    transform:
      type: template
      value: "Patient?identifier=https://hl7.fr/ig/fhir/core/CodeSystem/fr-core-cs-v2-0203|IPP|${ipp}"
