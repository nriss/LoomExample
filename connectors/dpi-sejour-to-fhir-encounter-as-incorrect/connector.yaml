name: dpi-sejour-to-fhir-encounter-as-incorrect
version: 1.0.0
author: nriss
tags: [encounter, sejour, dpi, example-broken]

description:
  fr: "EXEMPLE D'ERREUR — Utilisation incorrecte du bloc `as` sur des champs 0..1"
  en: "ERROR EXAMPLE — Incorrect use of `as` block on 0..1 fields"

# POURQUOI CE CONNECTEUR EST INCORRECT
#
# Le bloc `as` appelle toujours ensureArrayAndPush, ce qui est adapté
# aux champs à cardinalité 0..* (ex: identifier, reasonCode).
#
# Pour les champs à cardinalité 0..1 ou 1..1 (ex: class, serviceType,
# hospitalization), le résultat est un tableau au lieu d'un objet, ce
# qui produit des erreurs FHIR :
#   ERROR: The property class must be an Object, not an Array
#   ERROR: The property serviceType must be an Object, not an Array
#   ERROR: The property hospitalization must be an Object, not an Array
#
# RÈGLE : utiliser `as` uniquement pour les champs 0..* (tableaux FHIR).
# Pour les objets uniques, mapper chaque sous-champ individuellement.
# Voir dpi-sejour-to-fhir-encounter/connector.yaml pour la version correcte.

source:
  datasource: dpi_test
  query: |
    SELECT
      s.numero_sejour,
      s.date_entree,
      s.date_sortie,
      s.statut,
      s.type_sejour,
      s.mode_entree,
      s.libelle_mode_entree,
      s.mode_sortie,
      s.libelle_mode_sortie,
      s.uf_code,
      s.uf_libelle,
      s.dp_cim,
      s.dp_libelle,
      p.ipp
    FROM sejour s
    JOIN patient p ON p.id_patient = s.id_patient
    WHERE s.statut != 'ANNULE'
    ORDER BY s.date_entree DESC

target:
  resource: Encounter

lifecycle:
  strategy: upsert
  match_by:
    - column: numero_sejour
      fhir_path: Encounter.identifier[type.coding.code='NDA'].value

mappings:

  - column: numero_sejour
    target: Encounter.identifier
    as:
      identifier.use: "official"
      identifier.type.coding[0].system: "https://hl7.fr/ig/fhir/core/CodeSystem/fr-core-cs-v2-0203"
      identifier.type.coding[0].code: "NDA"
      identifier.value: "$.numero_sejour"

  - column: statut
    target: Encounter.status
    transform:
      type: map
      values:
        EN_COURS: in-progress
        TERMINE: finished
        ANNULE: cancelled
      default: unknown

  # ERREUR : class est un Coding unique (1..1), `as` crée class:[{...}] au lieu de class:{...}
  - column: type_sejour
    target: Encounter.class
    as:
      class.system: "http://terminology.hl7.org/CodeSystem/v3-ActCode"
      class.code: "$.type_sejour"
      class.display: "$.uf_libelle"

  - column: date_entree
    target: Encounter.period.start
    transform:
      type: date
      from: YYYY-MM-DD

  - column: date_sortie
    target: Encounter.period.end
    transform:
      type: date
      from: YYYY-MM-DD

  # ERREUR : serviceType est un CodeableConcept unique (0..1)
  - column: uf_code
    target: Encounter.serviceType
    as:
      serviceType.coding[0].code: "$.uf_code"
      serviceType.text: "$.uf_libelle"

  # OK : reasonCode est 0..*, `as` est correct
  - column: dp_cim
    target: Encounter.reasonCode
    as:
      reasonCode.coding[0].system: "http://hl7.org/fhir/sid/icd-10"
      reasonCode.coding[0].code: "$.dp_cim"
      reasonCode.text: "$.dp_libelle"

  # ERREUR : hospitalization est un objet unique (0..1)
  - column: mode_entree
    target: Encounter.hospitalization
    as:
      hospitalization.admitSource.coding[0].system: "https://mos.esante.gouv.fr/NOS/TRE_R213-ModePriseEnCharge/FHIR/TRE-R213-ModePriseEnCharge"
      hospitalization.admitSource.coding[0].code: "$.mode_entree"
      hospitalization.admitSource.text: "$.libelle_mode_entree"

  - column: mode_sortie
    target: Encounter.hospitalization
    as:
      hospitalization.dischargeDisposition.coding[0].system: "https://mos.esante.gouv.fr/NOS/TRE_R213-ModePriseEnCharge/FHIR/TRE-R213-ModePriseEnCharge"
      hospitalization.dischargeDisposition.coding[0].code: "$.mode_sortie"
      hospitalization.dischargeDisposition.text: "$.libelle_mode_sortie"

  - column: ipp
    target: Encounter.subject.reference
    transform:
      type: template
      value: "Patient?identifier=https://hl7.fr/ig/fhir/core/CodeSystem/fr-core-cs-v2-0203|IPP|${ipp}"
